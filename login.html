<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
    background:#e6f2ff;
}
.box{
    text-align:center;
    padding:20px;
    border:1px solid #ccc;
    border-radius:10px;
    background:#fff;
}
img{
    width:100px;
    margin-bottom:15px;
}
input,button{
    width:220px;
    padding:10px;
    margin:8px 0;
}
button{
    background:#004080;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>
<div class="box">
    <img src="logo.png" alt="Logo">
    <form>
        <input type="text" placeholder="Username" required><br>
        <input type="password" placeholder="Password" required><br>
        <button type="submit">Submit</button>
    </form>
</div>
</body>
</html>
